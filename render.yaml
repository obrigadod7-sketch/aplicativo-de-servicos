services:
  # Backend Service (FastAPI)
  - type: web
    name: jatai-regiao-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URL
        sync: false   # set in Render dashboard (MongoDB Atlas connection string)
      - key: DB_NAME
        value: jatai_regiao
      - key: CORS_ORIGINS
        value: https://jatai-regiao-frontend.onrender.com

  # Frontend (Static site — CRA production build)
  - type: web
    name: jatai-regiao-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: yarn install --frozen-lockfile && yarn build
    staticPublishPath: build
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: REACT_APP_BACKEND_URL
        value: https://jatai-regiao-backend.onrender.com
    routes:
      # SPA fallback so React Router routes resolve
      - type: rewrite
        source: /*
        destination: /index.html

# IMPORTANT: Create MongoDB Atlas (free M0) and paste its connection string
# into MONGO_URL via the Render dashboard before first deploy.
